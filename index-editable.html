const tabs = document.querySelectorAll('.tab-item');
const sectionIds = C.tabs.map(t => t.target);
const HEADER_H = 98;

tabs.forEach(tab => {
  tab.addEventListener('click', function() {
    const target = document.getElementById(this.dataset.target);
    if (!target) return;
    const top = target.getBoundingClientRect().top + window.scrollY - HEADER_H + 1;
    window.scrollTo({ top, behavior: 'smooth' });
    tabs.forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});

window.addEventListener('scroll', () => {
  let current = sectionIds[0];
  for (const id of sectionIds) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (el.getBoundingClientRect().top <= HEADER_H + 40) current = id;
  }
  tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.target === current));
}, { passive: true });

function getReply(text) {
  const t = text.toLowerCase();
  for (const item of C.chat.kb) {
    if (item.keys.some(k => t.includes(k))) return item.ans;
  }
  return C.chat.fallback.replace('${text}', text);
}

chatClose.addEventListener('click', closeChat);
$('ctaTop').addEventListener('click', openChat);
$('ctaBottom').addEventListener('click', openChat);

function timeStr() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function addMsg(text, role) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  const avatarChar = C.chat.botAvatar;
  if (role === 'bot') {
    wrap.innerHTML = `<div class="msg-avatar">${avatarChar}</div><div><div class="msg-bubble">${html}</div><div class="msg-time">${timeStr()}</div></div>`;
  } else {
    wrap.innerHTML = `<div><div class="msg-bubble">${html}</div><div class="msg-time" style="text-align:right">${timeStr()}</div></div>`;
  }
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="msg-avatar">${C.chat.botAvatar}</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function removeTyping() { const t = $('typing'); if(t) t.remove(); }

function sendMsg(text) {
  if (!text.trim()) return;
  quickBtnsEl.style.display = 'none';
  addMsg(text, 'user');
  chatInput.value = '';
  addTyping();
  const delay = 700 + Math.random() * 700;
  setTimeout(() => { removeTyping(); addMsg(getReply(text), 'bot'); }, delay);
}

chatSend.addEventListener('click', () => sendMsg(chatInput.value));
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(chatInput.value); });
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', function() { sendMsg(this.dataset.q); });
});

// 欢迎语
setTimeout(() => { addMsg(C.chat.welcome, 'bot'); }, 500);
</script>
</body>
</html>
